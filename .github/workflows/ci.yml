name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: fooddelivery
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Generate Prisma clients
      run: |
        cd packages/customer-service && npx prisma generate
        cd ../restaurant-service && npx prisma generate
        cd ../driver-service && npx prisma generate
        cd ../order-service && npx prisma generate
      env:
        DATABASE_URL: postgresql://postgres:test@localhost:5432/fooddelivery

    - name: Build TypeScript
      run: npm run build --workspaces --if-present
      env:
        NODE_ENV: production

    - name: Run tests
      run: |
        # TODO: Add proper tests with Prisma mocking
        # npm test --workspaces --if-present
        echo "Tests skipped - scaffold project needs test infrastructure"
      env:
        DATABASE_URL: postgresql://postgres:test@localhost:5432/fooddelivery
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: test-secret
        NODE_ENV: test

