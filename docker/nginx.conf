events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server frontend:5173;
    }
    
    upstream customer_service {
        server customer-service:3001;
    }
    
    upstream restaurant_service {
        server restaurant-service:3002;
    }
    
    upstream driver_service {
        server driver-service:3003;
    }
    
    upstream order_service {
        server order-service:3004;
    }
    
    server {
        listen 80;
        
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
        
        location /api/customers/ {
            proxy_pass http://customer_service/;
        }
        
        location /api/restaurants/ {
            proxy_pass http://restaurant_service/;
        }
        
        location /api/drivers/ {
            proxy_pass http://driver_service/;
        }
        
        location /api/orders/ {
            proxy_pass http://order_service/;
        }
        
        location /api/payments/ {
            proxy_pass http://order_service/;
        }
        
        location /webhooks/ {
            proxy_pass http://order_service/;
        }
        
        location /health/ {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
